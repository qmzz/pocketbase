<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供应商信息查询</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .header h1 { font-size: 20px; color: #1a1a1a; }
        .admin-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #f0f0f0;
            border-radius: 6px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
            transition: background 0.2s;
        }
        .admin-link:hover { background: #666; color: #fff; }
        
        .search-panel {
            margin-bottom: 20px;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .search-form {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }
        .form-group { flex: 1; min-width: 150px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            background: #fff;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4a90d9;
            box-shadow: 0 0 0 2px rgba(74,144,217,0.15);
        }
        .form-actions {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }
        .btn-primary {
            background: #4a90d9;
            color: #fff;
        }
        .btn-primary:hover { background: #3a7bc8; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .btn-ghost {
            background: transparent;
            color: #666;
        }
        .btn-ghost:hover { background: #f0f0f0; }
        
        .results-info {
            margin-bottom: 15px;
            padding: 12px 20px;
            background: #fff;
            border-radius: 6px;
            font-size: 14px;
        }
        .results-list { display: flex; flex-direction: column; gap: 15px; }
        .result-card {
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .supplier-name { font-size: 18px; color: #1a1a1a; flex: 1; }
        .label {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .label-info { background: #e3f2fd; color: #1976d2; }
        .label-success { background: #e8f5e9; color: #388e3c; }
        
        .info-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .info-label { font-weight: 600; color: #888; min-width: 85px; }
        
        .contacts-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        .contacts-section h6 {
            margin-bottom: 12px;
            font-size: 14px;
            color: #444;
        }
        .contact-item {
            padding: 12px;
            margin-bottom: 10px;
            background: #f9f9f9;
            border-radius: 6px;
            position: relative;
        }
        .contact-item.is-primary { border-left: 3px solid #4a90d9; }
        .primary-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 11px;
            padding: 2px 8px;
            background: #4a90d9;
            color: #fff;
            border-radius: 10px;
        }
        .contact-row {
            display: flex;
            gap: 6px;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 4px;
            font-size: 14px;
        }
        .contact-label { font-weight: 600; color: #888; }
        
        .loading, .empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .loading .loader, .empty .icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 25px;
        }
        .page-info { color: #888; font-size: 14px; }
        .btn-sm { padding: 8px 14px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>供应商信息查询</h1>
            <a href="/_/#/login" class="admin-link">
                <span>🔐</span>
                <span>后台入口</span>
            </a>
        </div>

        <div class="search-panel">
            <form class="search-form" id="searchForm">
                <div class="form-group">
                    <label for="keyword">搜索关键词</label>
                    <input type="text" id="keyword" placeholder="供应商名称 / 联系人 / 电话 / 微信号">
                </div>
                <div class="form-group">
                    <label for="supplierType">供应商类型</label>
                    <select id="supplierType">
                        <option value="">全部</option>
                        <option value="生产商">生产商</option>
                        <option value="经销商">经销商</option>
                        <option value="服务商">服务商</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="status">状态</label>
                    <select id="status">
                        <option value="">全部</option>
                        <option value="潜在">潜在</option>
                        <option value="合作中">合作中</option>
                        <option value="暂停">暂停</option>
                        <option value="停用">停用</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="searchBtn">
                        <span>🔍</span>
                        <span>搜索</span>
                    </button>
                    <button type="button" class="btn btn-ghost" id="clearBtn">
                        <span>✕</span>
                        <span>清空</span>
                    </button>
                </div>
            </form>
        </div>

        <div id="resultsContainer"></div>
    </div>

    <script>
        const API_BASE = '';
        let currentPage = 1;
        const perPage = 20;

        async function search(resetPage = true) {
            if (resetPage) currentPage = 1;

            const keyword = document.getElementById('keyword').value.trim();
            const supplierType = document.getElementById('supplierType').value;
            const status = document.getElementById('status').value;

            const filter = buildFilter(keyword, supplierType, status);
            const url = `${API_BASE}/api/collections/suppliers/records?page=${currentPage}&perPage=${perPage}&expand=supplier_contacts&sort=-created${filter ? '&filter=' + encodeURIComponent(filter) : ''}`;

            const container = document.getElementById('resultsContainer');
            container.innerHTML = '<div class="loading"><div class="loader">⏳</div><p>加载中...</p></div>';

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('Request failed');
                const data = await res.json();

                if (data.items.length === 0) {
                    container.innerHTML = '<div class="empty"><div class="icon">📭</div><p>暂无数据</p></div>';
                    return;
                }

                renderResults(data);
            } catch (err) {
                console.error('Search failed:', err);
                container.innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>加载失败</p></div>';
            }
        }

        function buildFilter(keyword, supplierType, status) {
            const conditions = [];

            if (keyword) {
                conditions.push(
                    `(${
                        'supplier_name ~ "' + keyword + '" || ' +
                        'supplier_code ~ "' + keyword + '" || ' +
                        'phone ~ "' + keyword + '" || ' +
                        'supplier_contacts.contact_name ~ "' + keyword + '" || ' +
                        'supplier_contacts.mobile ~ "' + keyword + '" || ' +
                        'supplier_contacts.wechat ~ "' + keyword + '"'
                    })`
                );
            }

            if (supplierType) conditions.push('supplier_type = "' + supplierType + '"');
            if (status) conditions.push('status = "' + status + '"');

            return conditions.length > 0 ? conditions.join(' && ') : '';
        }

        function renderResults(data) {
            const container = document.getElementById('resultsContainer');
            
            let html = '<div class="results-info">共找到 <strong>' + data.totalItems + '</strong> 条记录</div>';
            html += '<div class="results-list">';

            data.items.forEach(supplier => {
                html += '<div class="result-card">';
                html += '<div class="card-header">';
                html += '<h5 class="supplier-name">' + escapeHtml(supplier.supplier_name) + '</h5>';
                html += '<span class="label label-info">' + escapeHtml(supplier.supplier_type) + '</span>';
                html += '<span class="label label-success">' + escapeHtml(supplier.status) + '</span>';
                html += '</div>';

                html += '<div class="card-body">';
                html += '<div class="info-row"><span class="info-label">供应商编码：</span><span class="info-value">' + escapeHtml(supplier.supplier_code) + '</span></div>';
                html += '<div class="info-row"><span class="info-label">联系电话：</span><span class="info-value">' + (supplier.phone || '-') + '</span></div>';
                if (supplier.remark) {
                    html += '<div class="info-row"><span class="info-label">备注：</span><span class="info-value">' + escapeHtml(supplier.remark) + '</span></div>';
                }

                if (supplier.expand && supplier.expand.supplier_contacts && supplier.expand.supplier_contacts.length > 0) {
                    html += '<div class="contacts-section"><h6>联系人信息</h6>';
                    supplier.expand.supplier_contacts.forEach(contact => {
                        html += '<div class="contact-item' + (contact.is_primary ? ' is-primary' : '') + '">';
                        if (contact.is_primary) html += '<span class="primary-badge">主要</span>';
                        html += '<div class="contact-details">';
                        html += '<div class="contact-row"><span class="contact-label">姓名：</span><span class="contact-value">' + escapeHtml(contact.contact_name) + '</span><span class="contact-label" style="margin-left:12px">职位：</span><span class="contact-value">' + (contact.position || '-') + '</span></div>';
                        html += '<div class="contact-row"><span class="contact-label">手机：</span><span class="contact-value">' + (contact.mobile || '-') + '</span><span class="contact-label" style="margin-left:12px">邮箱：</span><span class="contact-value">' + (contact.email || '-') + '</span></div>';
                        html += '<div class="contact-row"><span class="contact-label">微信：</span><span class="contact-value">' + (contact.wechat || '-') + '</span>';
                        if (contact.remark) {
                            html += '<span class="contact-label" style="margin-left:12px">备注：</span><span class="contact-value">' + escapeHtml(contact.remark) + '</span>';
                        }
                        html += '</div></div></div>';
                    });
                    html += '</div>';
                }

                html += '</div></div>';
            });

            html += '</div>';

            if (data.totalPages > 1) {
                html += '<div class="pagination">';
                html += '<button class="btn btn-ghost btn-sm" ' + (currentPage <= 1 ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage - 1) + ')">← 上一页</button>';
                html += '<span class="page-info">第 ' + currentPage + ' 页 / 共 ' + data.totalPages + ' 页</span>';
                html += '<button class="btn btn-ghost btn-sm" ' + (currentPage >= data.totalPages ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage + 1) + ')">下一页 →</button>';
                html += '</div>';
            }

            container.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            search(false);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            search(true);
        });

        document.getElementById('clearBtn').addEventListener('click', function() {
            document.getElementById('keyword').value = '';
            document.getElementById('supplierType').value = '';
            document.getElementById('status').value = '';
            search(true);
        });

        search();
    </script>
</body>
</html>
